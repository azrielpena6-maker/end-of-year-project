<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoo Style Advanced</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar" id="navbar">
  <div class="logo">My Zoo</div>
  <nav>
    <a href="#">Visit</a>
    <a href="#">Animals</a>
    <a href="#">Conservation</a>
    <a href="#">Tickets</a>
  </nav>
</header>

<!-- HERO WITH VIDEO -->
<section class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Experience Wildlife</h1>
    <p>Adventure starts here</p>
    <button>Get Tickets</button>
  </div>
</section>

<!-- FEATURE SECTION -->
<section class="features">
  <div class="feature fade-in">
    <img src="https://source.unsplash.com/500x400/?elephant">
    <div>
      <h2>Wild Encounters</h2>
      <p>Get closer than ever to amazing animals.</p>
    </div>
  </div>

  <div class="feature fade-in">
    <img src="https://source.unsplash.com/500x400/?giraffe">
    <div>
      <h2>Plan Your Visit</h2>
      <p>Everything you need for a perfect day.</p>
    </div>
  </div>
</section>

<!-- SLIDER -->
<section class="slider">
  <h2>Featured Experiences</h2>
  <div class="slider-container">
    <div class="slide">Safari Tour</div>
    <div class="slide">Night Zoo</div>
    <div class="slide">Animal Feeding</div>
  </div>
</section>

<!-- CARDS -->
<section class="cards">
  <div class="card fade-in">
    <img src="https://source.unsplash.com/400x300/?lion">
    <h3>Lions</h3>
  </div>
  <div class="card fade-in">
    <img src="https://source.unsplash.com/400x300/?tiger">
    <h3>Tigers</h3>
  </div>
  <div class="card fade-in">
    <img src="https://source.unsplash.com/400x300/?panda">
    <h3>Pandas</h3>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script src="script.js"></script>
</body>
</html>
